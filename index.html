<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Заучивание Корана — тренажёр</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0f766e">
<link rel="icon" href="icons/favicon-32.png" sizes="32x32">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Коран">
<style>
  :root{
    --bg:#f5f3ec; --card:#fffdf7; --ink:#1f2a26; --muted:#6b7a72;
    --line:#e2ddd0; --accent:#0f766e; --accent-ink:#fff;
    --good:#15803d; --good-bg:#dcfce7; --bad:#b91c1c; --bad-bg:#fee2e2;
    --gold:#b8860b; --shadow:0 1px 3px rgba(0,0,0,.06),0 6px 24px rgba(0,0,0,.05);
    --radius:16px;
  }
  [data-theme="dark"]{
    --bg:#10110f; --card:#1a1c19; --ink:#e9ece6; --muted:#9aa69e;
    --line:#2b2e29; --accent:#2dd4bf; --accent-ink:#06201c;
    --good:#4ade80; --good-bg:#0f2a18; --bad:#f87171; --bad-bg:#2a1212;
    --gold:#d9a93a; --shadow:0 1px 3px rgba(0,0,0,.4),0 6px 24px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--bg); color:var(--ink); min-height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    font-size:16px; line-height:1.5; -webkit-text-size-adjust:100%;
  }
  @font-face{
    font-family:"UthmanicHafs";
    src:url("fonts/uthmanic_hafs.woff2") format("woff2");
    font-display:swap;
  }
  .ar{
    font-family:"UthmanicHafs","SF Arabic","Geeza Pro","Scheherazade New",
                "Traditional Arabic","Amiri","Noto Naskh Arabic",serif;
    direction:rtl; line-height:2.1; font-feature-settings:"liga" 1;
    color:var(--ar-ink, var(--ink));
  }
  .ar .waqf{color:var(--waqf, inherit)}
  .wrap{max-width:780px; margin:0 auto; padding:16px 16px 96px}
  header.top{
    display:flex; align-items:center; gap:12px; padding:14px 16px;
    position:sticky; top:0; z-index:10; background:var(--bg);
    border-bottom:1px solid var(--line);
  }
  header.top .logo{font-size:22px}
  header.top h1{font-size:17px; margin:0; font-weight:700; letter-spacing:.2px}
  header.top .sp{flex:1}
  .iconbtn{
    border:1px solid var(--line); background:var(--card); color:var(--ink);
    width:40px; height:40px; border-radius:12px; cursor:pointer; font-size:18px;
    display:grid; place-items:center;
  }
  .iconbtn:active{transform:scale(.96)}
  .backbtn{font-size:26px; line-height:1; padding-bottom:3px}
  .swatchrow{display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-top:6px}
  .swatch{width:30px; height:30px; border-radius:50%; border:2px solid var(--line); cursor:pointer; position:relative; padding:0}
  .swatch.on{border-color:var(--ink); box-shadow:0 0 0 2px var(--card),0 0 0 4px var(--ink)}
  .swatch.auto{background:repeating-conic-gradient(var(--muted) 0 25%, transparent 0 50%) 50%/10px 10px, var(--card)}
  .swatch.custom{display:grid; place-items:center; font-size:15px; overflow:hidden}
  .swatch.custom input{position:absolute; inset:0; opacity:0; cursor:pointer}
  .clabel{font-size:13px; color:var(--muted); margin-top:12px}
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:18px; margin:14px 0;
  }
  .btn{
    appearance:none; border:1px solid var(--line); background:var(--card); color:var(--ink);
    padding:11px 16px; border-radius:12px; cursor:pointer; font-size:15px; font-weight:600;
  }
  .btn:active{transform:scale(.98)}
  .btn.primary{background:var(--accent); color:var(--accent-ink); border-color:transparent}
  .btn.block{display:block; width:100%; text-align:center; padding:15px}
  .btn.sm{padding:7px 12px; font-size:13px; font-weight:600}
  .row{display:flex; gap:10px; flex-wrap:wrap; align-items:center}
  .muted{color:var(--muted)}
  .pill{
    display:inline-flex; align-items:center; gap:6px; padding:5px 11px; border-radius:999px;
    background:var(--bg); border:1px solid var(--line); font-size:13px; color:var(--muted);
  }
  /* ===== Home ===== */
  .stat-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:6px}
  .stat{background:var(--bg); border:1px solid var(--line); border-radius:12px; padding:12px; text-align:center}
  .stat b{display:block; font-size:24px; line-height:1.1}
  .stat span{font-size:12px; color:var(--muted)}
  .progressbar{height:10px; background:var(--bg); border:1px solid var(--line); border-radius:999px; overflow:hidden; margin-top:10px}
  .progressbar>i{display:block; height:100%; background:linear-gradient(90deg,var(--accent),var(--gold)); width:0}
  .quickrow{display:flex; gap:8px; flex-wrap:wrap; margin:10px 0}
  .tabs{display:flex; gap:8px}
  .tab{flex:1; text-align:center; padding:11px 6px; border:1px solid var(--line); background:var(--card); color:var(--ink); border-radius:12px; cursor:pointer; font-weight:600; font-size:14px}
  .tab.on{background:var(--accent); color:var(--accent-ink); border-color:transparent}
  .numgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(48px,1fr)); gap:6px; max-height:300px; overflow:auto; margin-top:10px; padding:2px}
  .numcell{position:relative; border:1px solid var(--line); background:var(--bg); color:var(--ink); border-radius:10px; padding:9px 0; text-align:center; font-size:13px; font-weight:600; cursor:pointer}
  .numcell:active{transform:scale(.96)}
  .numcell.on{background:var(--accent); color:var(--accent-ink); border-color:transparent}
  .numcell.dl::after{content:"⤓"; position:absolute; top:1px; right:4px; font-size:10px; color:var(--good)}
  .numcell.on.dl::after{color:#fff}
  .surow.dl .arname::after{content:" ⤓"; color:var(--good); font-size:13px}
  .search{width:100%; padding:11px 14px; border-radius:12px; border:1px solid var(--line); background:var(--bg); color:var(--ink); font-size:15px}
  .surahlist{max-height:320px; overflow:auto; margin-top:10px; border:1px solid var(--line); border-radius:12px}
  .surow{display:flex; align-items:center; gap:12px; padding:10px 12px; border-bottom:1px solid var(--line); cursor:pointer}
  .surow:last-child{border-bottom:none}
  .surow:hover{background:var(--bg)}
  .surow .num{width:30px; height:30px; border-radius:8px; background:var(--bg); border:1px solid var(--line); display:grid; place-items:center; font-size:12px; font-weight:700; color:var(--muted); flex:0 0 auto}
  .surow.on .num{background:var(--accent); color:var(--accent-ink); border-color:transparent}
  .surow .meta{flex:1; min-width:0}
  .surow .meta .en{font-weight:600}
  .surow .meta .sub{font-size:12px; color:var(--muted)}
  .surow .arname{font-size:20px}
  .surow.on{background:color-mix(in srgb, var(--accent) 10%, transparent)}
  .surow .chk{flex:0 0 auto; width:24px; height:24px; border-radius:7px; border:1.5px solid var(--line); display:grid; place-items:center; color:transparent; font-size:14px; font-weight:700}
  .surow.on .chk{background:var(--accent); border-color:transparent; color:var(--accent-ink)}
  .surow input{display:none}
  /* ===== Quiz ===== */
  .qhead{display:flex; align-items:center; justify-content:space-between; margin-bottom:6px}
  .prompt{font-size:30px; text-align:center; padding:18px 6px}
  .prompt .seg{margin:8px 0}
  .askline{text-align:center; color:var(--muted); font-size:14px; margin:6px 0 2px}
  .opts{display:flex; flex-direction:column; gap:10px; margin-top:8px}
  .opt{
    display:flex; gap:12px; align-items:center; text-align:right;
    border:1px solid var(--line); background:var(--card); border-radius:14px;
    padding:12px 14px; cursor:pointer; transition:background .12s,border-color .12s;
  }
  .opt:hover{border-color:var(--accent)}
  .opt .key{flex:0 0 auto; width:26px; height:26px; border-radius:8px; background:var(--bg); border:1px solid var(--line); display:grid; place-items:center; font-size:13px; font-weight:700; color:var(--muted)}
  .opt .txt{flex:1; font-size:23px}
  .opt.correct{background:var(--good-bg); border-color:var(--good)}
  .opt.correct .key{background:var(--good); color:#fff; border-color:transparent}
  .opt.wrong{background:var(--bad-bg); border-color:var(--bad)}
  .opt.wrong .key{background:var(--bad); color:#fff; border-color:transparent}
  .opt.disabled{cursor:default}
  .feedback{margin-top:14px; text-align:center; min-height:26px; font-weight:600}
  .feedback.ok{color:var(--good)} .feedback.no{color:var(--bad)}
  .ref{text-align:center; color:var(--muted); font-size:14px; margin-top:4px}
  .bottombar{position:fixed; left:0; right:0; bottom:0; padding:12px 16px calc(12px + env(safe-area-inset-bottom)); background:linear-gradient(transparent,var(--bg) 28%); display:flex; gap:10px; max-width:780px; margin:0 auto}
  .hidden{display:none!important}
  .audio-btn{border:1px solid var(--line); background:var(--bg); color:var(--ink); border-radius:999px; padding:7px 14px; cursor:pointer; font-size:14px; font-weight:600}
  .toast{position:fixed; bottom:88px; left:50%; transform:translateX(-50%); background:var(--ink); color:var(--bg); padding:10px 16px; border-radius:999px; font-size:14px; opacity:0; transition:opacity .2s; pointer-events:none; z-index:50}
  .toast.show{opacity:.95}
  label.check{display:flex; align-items:center; gap:10px; padding:8px 0; cursor:pointer}
  label.check input{width:18px; height:18px; accent-color:var(--accent)}
  select,.seg-select{padding:8px 10px; border-radius:10px; border:1px solid var(--line); background:var(--bg); color:var(--ink); font-size:14px; font-weight:600}
  h2{font-size:16px; margin:2px 0 10px} h3{font-size:14px; margin:18px 0 6px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px}
</style>
</head>
<body>
<header class="top">
  <button class="iconbtn backbtn hidden" id="btnBack" title="Назад">‹</button>
  <span class="logo">📖</span>
  <h1>Заучивание Корана</h1>
  <span class="sp"></span>
  <button class="iconbtn hidden" id="btnInstall" title="Установить приложение">⤓</button>
  <button class="iconbtn" id="btnTheme" title="Тема">🌙</button>
</header>

<div class="wrap">

  <!-- ===================== ГЛАВНАЯ ===================== -->
  <section id="home">
    <div class="card">
      <h2>Настройки тренировки</h2>
      <div style="margin-bottom:14px">
        <div class="muted" style="font-size:13px">Режим тренировки</div>
        <select id="selMode" style="width:100%;margin-top:4px">
          <option value="continue">Продолжи аят</option>
          <option value="before">Найди начало (что идёт перед)</option>
          <option value="word">Пропущенное слово</option>
          <option value="surah">Угадай суру</option>
        </select>
      </div>
      <div class="row" style="justify-content:space-between">
        <div>
          <div class="muted" style="font-size:13px">Сколько аятов показывать</div>
          <select id="selPrompt">
            <option value="1">1 аят</option>
            <option value="2">2 аята</option>
          </select>
        </div>
        <div>
          <div class="muted" style="font-size:13px">Вариантов ответа</div>
          <select id="selOpts">
            <option value="3">3</option>
            <option value="4" selected>4</option>
            <option value="5">5</option>
          </select>
        </div>
        <div>
          <div class="muted" style="font-size:13px">Аудио</div>
          <select id="selAudio">
            <option value="off">не играть</option>
            <option value="manual" selected>по кнопке</option>
            <option value="auto">авто</option>
          </select>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Внешний вид</h2>
      <div class="clabel">Цвет текста аята</div>
      <div class="swatchrow" id="swAr"></div>
      <div class="clabel">Акцент интерфейса</div>
      <div class="swatchrow" id="swAccent"></div>
      <div class="clabel">Фон страницы</div>
      <div class="swatchrow" id="swBg"></div>
    </div>

    <div class="card">
      <div class="tabs" id="panelTabs">
        <button class="tab" data-panel="train">Тренировка</button>
        <button class="tab" data-panel="audio">Аудио</button>
      </div>
      <div class="tabs" style="margin-top:8px">
        <button class="tab" data-tab="page">Страницы</button>
        <button class="tab" data-tab="juz">Джузы</button>
        <button class="tab" data-tab="surah">Суры</button>
      </div>
      <div class="quickrow" id="quickRow" style="margin-top:10px">
        <button class="btn sm" id="qAll">Выбрать все</button>
        <button class="btn sm" id="qNone">Снять все</button>
      </div>
      <div class="muted hidden" id="audioHint" style="font-size:13px;margin-top:10px">Нажми на страницу / джуз / суру, чтобы скачать рецитацию для офлайна. ⤓ — уже скачано.</div>
      <input class="search hidden" id="surahSearch" placeholder="Поиск суры по названию или номеру…">
      <div id="numWrap" class="hidden"><div class="numgrid" id="numGrid"></div></div>
      <div class="surahlist hidden" id="surahList"></div>
      <div class="muted" id="selCountLine" style="margin-top:8px;font-size:13px"><span id="selCount">0</span> аятов выбрано</div>
      <div class="muted hidden" id="dlStatus" style="margin-top:8px;font-size:13px"></div>
    </div>

    <button class="btn primary block" id="btnStart">Начать тренировку →</button>
  </section>

  <!-- ===================== ТРЕНИРОВКА ===================== -->
  <section id="quiz" class="hidden">
    <div class="card">
      <div class="qhead">
        <span class="pill" id="qSurah">—</span>
        <span class="pill" id="qProgress">0 / 0</span>
      </div>
      <div class="askline" id="askLine">Продолжи аят:</div>
      <div class="prompt ar" id="promptBox"></div>
      <div class="row" style="justify-content:center">
        <button class="audio-btn" id="btnPlayPrompt">▶︎ Прослушать</button>
      </div>
      <div class="opts" id="optsBox"></div>
      <div class="feedback" id="feedback"></div>
      <div class="ref" id="refLine"></div>
    </div>
  </section>
</div>

<div class="bottombar hidden" id="quizBar">
  <button class="btn block" id="btnSkip">Пропустить</button>
  <button class="btn primary block" id="btnNext">Далее →</button>
</div>

<div class="toast" id="toast"></div>

<audio id="player" preload="none"></audio>

<script src="data/quran.js"></script>
<script>
"use strict";
(function(){
  const Q = window.QURAN;
  if(!Q){ document.body.innerHTML='<p style="padding:24px">Не найден файл данных <code>data/quran.js</code>. Запусти <code>python3 tools/build_data.py</code>.</p>'; return; }

  // ---------- Плоский индекс всех аятов ----------
  const SUR = Q.surahs;                       // массив сур
  const byNum = {}; SUR.forEach(s=>byNum[s.num]=s);
  const ALL = [];                             // все аяты с ссылкой на суру
  SUR.forEach(s=> s.ayahs.forEach((a,i)=> ALL.push({su:s.num,sname:s.name,sen:s.en,i,n:a.n,g:a.g,t:a.t,j:a.j,p:a.p,count:s.count})));
  const byG = {}; ALL.forEach(a=>byG[a.g]=a);

  // индексы страница→[g], джуз→[g]
  const pageGs={}, juzGs={};
  let MAXPAGE=1, MAXJUZ=1;
  ALL.forEach(a=>{ (pageGs[a.p]=pageGs[a.p]||[]).push(a.g); (juzGs[a.j]=juzGs[a.j]||[]).push(a.g);
                   if(a.p>MAXPAGE)MAXPAGE=a.p; if(a.j>MAXJUZ)MAXJUZ=a.j; });

  // ---------- Состояние ----------
  const LS_KEY="quran_trainer_v1";
  const defState={ selSurahs:SUR.map(s=>s.num), selPages:[], selJuz:[],
                   mode:"continue", promptLen:1, opts:4, audio:"manual",
                   srs:{}, seen:0, correct:0, theme:"light",
                   col:{ar:"",accent:"",bg:""} };

  // Короткие подписи режимов для плашки в тесте
  const MODES={ continue:"Продолжи", before:"Найди начало", word:"Пропущенное слово", surah:"Угадай суру" };
  let S = load();
  function load(){ try{ const r=JSON.parse(localStorage.getItem(LS_KEY)); if(r){ if(r.active&&!r.selSurahs){ r.selSurahs=r.active; } if(![3,4,5].includes(r.opts)) r.opts=4; return Object.assign({},JSON.parse(JSON.stringify(defState)),r);} }catch(e){} return JSON.parse(JSON.stringify(defState)); }
  function save(){ localStorage.setItem(LS_KEY, JSON.stringify(S)); }

  // ---------- Утилиты ----------
  const $=id=>document.getElementById(id);
  const rnd=n=>Math.floor(Math.random()*n);
  function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=rnd(i+1);[a[i],a[j]]=[a[j],a[i]];} return a; }
  function sample(arr,k){ const c=arr.slice(); shuffle(c); return c.slice(0,k); }
  function toast(msg){ const t=$("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),1400); }

  // ---------- Тема ----------
  function applyTheme(){ document.documentElement.setAttribute("data-theme", S.theme); $("btnTheme").textContent = S.theme==="dark"?"☀️":"🌙"; applyColors(); }
  $("btnTheme").onclick=()=>{ S.theme=S.theme==="dark"?"light":"dark"; save(); applyTheme(); };

  // ---------- Цвета (пользовательские, поверх темы) ----------
  if(!S.col) S.col={ar:"",accent:"",bg:""};
  function applyColors(){
    const root=document.documentElement.style;
    root.setProperty("--ar-ink", S.col.ar || "var(--ink)");
    if(S.col.accent) root.setProperty("--accent", S.col.accent); else root.removeProperty("--accent");
    if(S.col.bg) root.setProperty("--bg", S.col.bg); else root.removeProperty("--bg");
    computeWaqf();
  }
  // ---- авто-цвет знаков остановки: максимально контрастный к фону И к тексту ----
  const WAQF_CANDS=["#e11d2e","#1d6fe1","#0a8f3c","#8a2be2","#e07b00","#00a3a3","#d6006e","#f5c400","#111111","#ffffff"];
  const hexRGB=h=>{h=h.replace("#","");if(h.length===3)h=h.split("").map(x=>x+x).join("");return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];};
  const parseRGB=s=>{const m=s.match(/[\d.]+/g);return m?[+m[0],+m[1],+m[2]]:[0,0,0];};
  const lum=c=>{const a=c.map(v=>{v/=255;return v<=0.03928?v/12.92:Math.pow((v+0.055)/1.055,2.4);});return 0.2126*a[0]+0.7152*a[1]+0.0722*a[2];};
  const contrast=(a,b)=>{const L1=lum(a),L2=lum(b),hi=Math.max(L1,L2),lo=Math.min(L1,L2);return (hi+0.05)/(lo+0.05);};
  function computeWaqf(){
    const bg=parseRGB(getComputedStyle(document.body).backgroundColor);
    const probe=document.createElement("span"); probe.className="ar";
    probe.style.cssText="position:absolute;left:-9999px;visibility:hidden"; probe.textContent="ا";
    document.body.appendChild(probe); const ink=parseRGB(getComputedStyle(probe).color); probe.remove();
    let best=WAQF_CANDS[0], score=-1;
    WAQF_CANDS.forEach(c=>{ const rgb=hexRGB(c); const s=Math.min(contrast(rgb,bg),contrast(rgb,ink)); if(s>score){score=s;best=c;} });
    document.documentElement.style.setProperty("--waqf", best);
  }
  // оборачивает знаки остановок (вакф/символы) в <span class="waqf"> для отдельного цвета
  const WAQF_RE=/([ۖ-ۜ۝۞۩])/g;
  const wrapWaqf=t=> t.replace(WAQF_RE,'<span class="waqf">$1</span>');
  const PRESETS={
    ar:     ["#1f2a26","#0f4c3a","#5b3a1a","#7a1f1f","#14532d"],
    accent: ["#0f766e","#b8860b","#1d4ed8","#9333ea","#b91c1c"],
    bg:     ["#f5f3ec","#ffffff","#f0ead6","#eef2ee","#1a1c19"]
  };
  function buildSwatches(boxId, key){
    const box=$(boxId); box.innerHTML="";
    const mk=(color,cls,title)=>{ const b=document.createElement("button");
      b.className="swatch "+cls+((S.col[key]||"")===(color||"")?" on":"");
      if(color) b.style.background=color; b.title=title||""; return b; };
    // авто (цвет темы)
    const auto=mk("","auto","По умолчанию");
    auto.onclick=()=>{ S.col[key]=""; save(); applyColors(); renderColorUI(); };
    box.appendChild(auto);
    PRESETS[key].forEach(c=>{ const b=mk(c,"","");
      b.onclick=()=>{ S.col[key]=c; save(); applyColors(); renderColorUI(); }; box.appendChild(b); });
    // свой цвет
    const cust=document.createElement("button"); cust.className="swatch custom"; cust.title="Свой цвет"; cust.textContent="🎨";
    const inp=document.createElement("input"); inp.type="color"; inp.value=S.col[key]||"#000000";
    inp.oninput=e=>{ S.col[key]=e.target.value; save(); applyColors(); };
    inp.onchange=()=>renderColorUI();
    cust.appendChild(inp); box.appendChild(cust);
  }
  function renderColorUI(){ buildSwatches("swAr","ar"); buildSwatches("swAccent","accent"); buildSwatches("swBg","bg"); }

  // ---------- Установка PWA ----------
  let deferredPrompt=null;
  window.addEventListener("beforeinstallprompt", e=>{ e.preventDefault(); deferredPrompt=e; $("btnInstall").classList.remove("hidden"); });
  $("btnInstall").onclick=async()=>{ if(!deferredPrompt) return; deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null; $("btnInstall").classList.add("hidden"); };
  window.addEventListener("appinstalled", ()=> $("btnInstall").classList.add("hidden"));

  // ====================================================================
  //  ГЛАВНЫЙ ЭКРАН
  // ====================================================================
  // активная выборка: объединение выбранных сур, страниц и джузов → множество g
  function activeGset(){
    const selS=new Set(S.selSurahs), selP=new Set(S.selPages), selJ=new Set(S.selJuz);
    const g=new Set();
    ALL.forEach(a=>{ if(selS.has(a.su)||selP.has(a.p)||selJ.has(a.j)) g.add(a.g); });
    return g;
  }

  // какие g уже скачаны (в кэше service worker) — для пометки «скачано»
  let cachedG=new Set();
  async function loadCached(){
    cachedG=new Set();
    try{ const c=await caches.open(AUDIO_CACHE); const keys=await c.keys();
      keys.forEach(req=>{ const m=req.url.match(/\/(\d+)\.mp3(?:$|\?)/); if(m) cachedG.add(+m[1]); }); }catch(e){}
  }
  const allDownloaded=gs=> gs.length>0 && gs.every(g=>cachedG.has(g));

  let curTab="surah", panel="train";   // panel: train | audio
  const arrField=tab=> tab==="page"?"selPages": tab==="juz"?"selJuz":"selSurahs";
  const isAudio=()=> panel==="audio";

  function renderSelector(){
    document.querySelectorAll("#panelTabs .tab").forEach(t=>t.classList.toggle("on", t.dataset.panel===panel));
    document.querySelectorAll("[data-tab]").forEach(t=>t.classList.toggle("on", t.dataset.tab===curTab));
    $("quickRow").classList.toggle("hidden", isAudio());
    $("audioHint").classList.toggle("hidden", !isAudio());
    $("selCountLine").classList.toggle("hidden", isAudio());
    $("dlStatus").classList.toggle("hidden", !isAudio());
    const isSurah=curTab==="surah";
    $("surahSearch").classList.toggle("hidden", !isSurah);
    $("surahList").classList.toggle("hidden", !isSurah);
    $("numWrap").classList.toggle("hidden", isSurah);
    if(isSurah) renderSurahList($("surahSearch").value);
    else renderNumGrid();
    updateSelCount();
  }

  function renderNumGrid(){
    const box=$("numGrid"); box.innerHTML="";
    const isPage=curTab==="page";
    const max=isPage?MAXPAGE:MAXJUZ;
    const field=isPage?"selPages":"selJuz"; const set=new Set(S[field]);
    const gsOf=isPage?pageGs:juzGs;
    for(let i=1;i<=max;i++){
      const cell=document.createElement("div");
      const dl=allDownloaded(gsOf[i]||[]);
      const on=!isAudio() && set.has(i);
      cell.className="numcell"+(on?" on":"")+(dl?" dl":"");
      cell.textContent=i;
      cell.onclick=()=>{
        if(isAudio()){ downloadGs(gsOf[i]||[], (isPage?"Стр. ":"Джуз ")+i, cell); return; }
        const was=S[field].includes(i);
        S[field]= was ? S[field].filter(x=>x!==i) : S[field].concat(i);
        save(); cell.classList.toggle("on", !was); updateSelCount();
      };
      box.appendChild(cell);
    }
  }

  function renderSurahList(filter=""){
    const box=$("surahList"); box.innerHTML="";
    const set=new Set(S.selSurahs); const f=filter.trim().toLowerCase();
    SUR.forEach(s=>{
      if(f){ const hay=(s.en+" "+s.tr+" "+s.num).toLowerCase(); if(hay.indexOf(f)<0) return; }
      const dl=allDownloaded(s.ayahs.map(a=>a.g));
      const on=!isAudio() && set.has(s.num);
      const row=document.createElement("div");
      row.className="surow"+(on?" on":"")+(dl?" dl":"");
      row.innerHTML=`<div class="chk">✓</div><div class="num">${s.num}</div>
        <div class="meta"><div class="en">${s.en} <span class="muted" style="font-weight:400">· ${s.tr}</span></div>
        <div class="sub">${s.count} аятов · ${s.type==="Meccan"?"мекканская":"мединская"}</div></div>
        <div class="arname ar">${s.name.replace(/^سُورَةُ\s*/,"")}</div>`;
      row.onclick=()=>{
        if(isAudio()){ downloadGs(s.ayahs.map(a=>a.g), s.en, row); return; }
        const was=S.selSurahs.includes(s.num);
        S.selSurahs = was ? S.selSurahs.filter(x=>x!==s.num) : S.selSurahs.concat(s.num);
        save(); row.classList.toggle("on", !was); updateSelCount();
      };
      box.appendChild(row);
    });
  }
  function updateSelCount(){ $("selCount").textContent=activeGset().size; }

  $("qAll").onclick=()=>{
    if(curTab==="page") S.selPages=Array.from({length:MAXPAGE},(_,i)=>i+1);
    else if(curTab==="juz") S.selJuz=Array.from({length:MAXJUZ},(_,i)=>i+1);
    else S.selSurahs=SUR.map(s=>s.num);
    save(); renderSelector();
  };
  $("qNone").onclick=()=>{ S[arrField(curTab)]=[]; save(); renderSelector(); };
  document.querySelectorAll("#panelTabs .tab").forEach(t=>t.onclick=()=>{ panel=t.dataset.panel; renderSelector(); });
  document.querySelectorAll("[data-tab]").forEach(t=>t.onclick=()=>{ curTab=t.dataset.tab; renderSelector(); });
  $("surahSearch").oninput=e=>renderSurahList(e.target.value);

  // селекторы настроек
  $("selMode").value=S.mode; $("selPrompt").value=String(S.promptLen); $("selOpts").value=String(S.opts); $("selAudio").value=S.audio;
  $("selMode").onchange=e=>{S.mode=e.target.value; save(); updateSelCount();};
  $("selPrompt").onchange=e=>{S.promptLen=+e.target.value; save(); updateSelCount();};
  $("selOpts").onchange=e=>{S.opts=+e.target.value; save();};
  $("selAudio").onchange=e=>{S.audio=e.target.value; save(); applyAudioMode();};

  // ---------- разбор слов (для режима «пропущенное слово») ----------
  // длина «скелета» слова без огласовок/знаков — чтобы отличать слова от вакф-знаков
  function baseLen(w){ return w.replace(/[ً-ٰٟۖ-ۭـ]/g,"").length; }
  function isWord(w){ return baseLen(w)>=2; }
  function wordTokens(t){ return t.split(/\s+/).filter(isWord); }

  // прогресс — набор «опорных» аятов зависит от режима
  function candidates(mode){
    const G=activeGset(); const res=[];
    SUR.forEach(s=>{
      const A=s.ayahs;
      if(mode==="continue"){ for(let i=S.promptLen;i<A.length;i++) if(G.has(A[i].g)) res.push(A[i].g); }
      else if(mode==="before"){ for(let i=0;i<A.length-1;i++) if(G.has(A[i].g)) res.push(A[i].g); }
      else if(mode==="word"){ for(let i=0;i<A.length;i++) if(G.has(A[i].g)&&wordTokens(A[i].t).length>=3) res.push(A[i].g); }
      else { for(let i=0;i<A.length;i++) if(G.has(A[i].g)) res.push(A[i].g); } // surah
    });
    return res;
  }

  // ====================================================================
  //  ТРЕНИРОВКА
  // ====================================================================
  let cur=null, answered=false, sessionDone=0, sessionTotal=0;
  const player=$("player");

  function audioUrl(g){ return Q.audioBase.replace("{n}",g); }
  // Проигрывает аяты по списку последовательно. Сначала пробует локальный файл
  // audio/<g>.mp3 (если скачан инструментом download_audio.py), при ошибке — стрим с CDN.
  function playList(gs){
    let k=0;
    const step=()=>{ if(k>=gs.length){ player.onended=null; return; } const g=gs[k++];
      player.onended=step;
      cacheAyah(g);                 // при прослушивании сразу кладём аят в офлайн-кэш
      player.src="audio/"+g+".mp3";
      player.play().catch(()=>{ player.src=audioUrl(g); player.play().catch(()=>{}); });
    };
    step();
  }
  // фоном скачивает аят в кэш (если ещё нет) и помечает как скачанный
  function cacheAyah(g){
    if(cachedG.has(g)) return;
    grabAudio(g).then(r=>{ if(r==="ok"||r==="cached"){ cachedG.add(g);
      if(!$("home").classList.contains("hidden")) renderSelector(); } });
  }
  function applyAudioMode(){ const b=$("btnPlayPrompt"); if(b) b.style.display = S.audio==="off"?"none":""; }

  function pickWeighted(cands){
    // вес тем больше, чем хуже знаешь аят (низкий box) и чем дольше не повторял
    let total=0; const w=cands.map(g=>{ const r=S.srs[g]; const box=r?r.box:0; let weight=7-Math.min(box,6); if(!r) weight+=3; total+=weight; return weight; });
    let x=Math.random()*total;
    for(let i=0;i<cands.length;i++){ x-=w[i]; if(x<=0) return cands[i]; }
    return cands[cands.length-1];
  }

  function buildDistractors(correct, n, exclude){
    const pool=[]; const seenTxt=new Set([correct.t, ...(exclude||[])]);
    const add=a=>{ if(!seenTxt.has(a.t)){ seenTxt.add(a.t); pool.push(a); } };
    // 1) та же сура
    byNum[correct.su].ayahs.forEach(a=>{ if(a.g!==correct.g) add(byG[a.g]); });
    let need=n; let res=sample(pool,Math.min(need,pool.length));
    // 2) тот же джуз
    if(res.length<need){ const more=ALL.filter(a=>a.j===correct.j); shuffle(more); for(const a of more){ if(res.length>=need)break; if(!seenTxt.has(a.t)){seenTxt.add(a.t);res.push(a);} } }
    // 3) откуда угодно
    if(res.length<need){ const more=ALL.slice(); shuffle(more); for(const a of more){ if(res.length>=need)break; if(!seenTxt.has(a.t)){seenTxt.add(a.t);res.push(a);} } }
    return res.slice(0,need);
  }

  function surahLabel(s){ return `${s.num}. ${s.en}`; }

  function buildWordDistractors(missing, s, a, n){
    const seen=new Set([missing]); const pool=[];
    const collect=ayahs=>ayahs.forEach(ay=>ay.t.split(/\s+/).forEach(w=>{ if(isWord(w)&&!seen.has(w)){seen.add(w);pool.push(w);} }));
    collect(s.ayahs); shuffle(pool);
    let res=pool.slice(0,n);
    if(res.length<n){ const ex=[]; ALL.filter(x=>x.j===a.j).forEach(x=>x.t.split(/\s+/).forEach(w=>{ if(isWord(w)&&!seen.has(w)){seen.add(w);ex.push(w);} })); shuffle(ex); for(const w of ex){ if(res.length>=n)break; res.push(w);} }
    if(res.length<n){ const ex=[]; ALL.forEach(x=>x.t.split(/\s+/).forEach(w=>{ if(isWord(w)&&!seen.has(w)){seen.add(w);ex.push(w);} })); shuffle(ex); for(const w of ex){ if(res.length>=n)break; res.push(w);} }
    return res.slice(0,n);
  }

  // Генерирует вопрос по режиму. g — «опорный» аят (см. candidates).
  // Возвращает {ask, promptHTML, options:[{text,correct,ar}], refLine, srsKey, audioGs, answerGs}.
  function buildQuestion(mode, g){
    const a=byG[g], s=byNum[a.su], idx=a.i, A=s.ayahs;
    const opt=t=>({text:t,correct:false,ar:true});

    if(mode==="continue"){
      const prompts=[]; for(let k=S.promptLen;k>=1;k--) prompts.push(A[idx-k]);
      const d=buildDistractors(a,S.opts-1,prompts.map(p=>p.t));
      return { ask:S.promptLen>1?"Что идёт дальше?":"Продолжи аят:",
        promptHTML:prompts.map(p=>`<div class="seg">${p.t}</div>`).join(""),
        options:shuffle([{text:a.t,correct:true,ar:true}, ...d.map(x=>opt(x.t))]),
        refLine:`${s.en} (${s.num}:${a.n})`, srsKey:g, audioGs:prompts.map(p=>p.g), answerGs:[g] };
    }
    if(mode==="before"){
      const shown=A[idx+1];
      const d=buildDistractors(a,S.opts-1,[shown.t]);
      return { ask:"Какой аят идёт ПЕРЕД этим?",
        promptHTML:`<div class="seg">${shown.t}</div>`,
        options:shuffle([{text:a.t,correct:true,ar:true}, ...d.map(x=>opt(x.t))]),
        refLine:`${s.en} (${s.num}:${a.n} → ${shown.n})`, srsKey:g, audioGs:[shown.g], answerGs:[g] };
    }
    if(mode==="word"){
      const words=a.t.split(/\s+/);
      const idxs=words.map((w,i)=>i).filter(i=>isWord(words[i]));
      const wi=idxs[rnd(idxs.length)], missing=words[wi];
      const blanked=words.map((w,i)=> i===wi ? "□□□" : w).join(" ");
      const d=buildWordDistractors(missing,s,a,S.opts-1);
      return { ask:"Какое слово пропущено?",
        promptHTML:`<div class="seg">${blanked}</div>`,
        options:shuffle([{text:missing,correct:true,ar:true}, ...d.map(opt)]),
        refLine:`${s.en} (${s.num}:${a.n})`, srsKey:g, audioGs:[g], answerGs:[g] };
    }
    // surah — угадать суру по аяту
    const selS=new Set(S.selSurahs);
    const act=SUR.filter(x=>x.num!==s.num && selS.has(x.num));
    const rest=SUR.filter(x=>x.num!==s.num && !selS.has(x.num));
    const pool=[...shuffle(act), ...shuffle(rest)].slice(0,S.opts-1);
    return { ask:"Из какой суры этот аят?",
      promptHTML:`<div class="seg">${a.t}</div>`,
      options:shuffle([{text:surahLabel(s),correct:true,ar:false}, ...pool.map(x=>({text:surahLabel(x),correct:false,ar:false}))]),
      refLine:`${s.en} (${s.num}:${a.n})`, srsKey:g, audioGs:[g], answerGs:[g] };
  }

  function newQuestion(){
    answered=false;
    const cand=candidates(S.mode);
    if(!cand.length){ toast("Мало данных для режима — выбери больше сур"); showHome(); return; }
    cur=buildQuestion(S.mode, pickWeighted(cand));
    renderQuestion(cur);
  }

  function renderQuestion(q){
    $("qSurah").textContent=MODES[S.mode];
    sessionTotal++; $("qProgress").textContent=`${sessionDone} / ${sessionTotal}`;
    $("askLine").textContent=q.ask;
    $("promptBox").innerHTML=wrapWaqf(q.promptHTML);
    const ob=$("optsBox"); ob.innerHTML="";
    q.options.forEach((o,i)=>{
      const el=document.createElement("div"); el.className="opt";
      const key=i<9?(i+1):(i===9?"0":"");
      el.innerHTML=`<div class="key">${key}</div><div class="txt${o.ar?" ar":""}">${o.ar?wrapWaqf(o.text):o.text}</div>`;
      el.onclick=()=>choose(o,el);
      ob.appendChild(el);
    });
    $("feedback").textContent=""; $("feedback").className="feedback";
    $("refLine").textContent="";
    $("btnNext").classList.add("hidden"); $("btnSkip").classList.remove("hidden");
    applyAudioMode();
    if(S.audio==="auto" && q.audioGs && q.audioGs.length) playList(q.audioGs);
  }

  function recordResult(g,ok){
    let r=S.srs[g]||{box:0,seen:0,correct:0,wrong:0};
    r.seen++; if(ok){ r.correct++; r.box=Math.min(6,r.box+1);} else { r.wrong++; r.box=0; }
    S.srs[g]=r; S.seen++; if(ok)S.correct++; save();
  }

  function choose(opt,el){
    if(answered) return; answered=true;
    const correct=!!opt.correct;
    recordResult(cur.srsKey, correct);
    [...$("optsBox").children].forEach((c,i)=>{ c.classList.add("disabled"); c.onclick=null; if(cur.options[i].correct) c.classList.add("correct"); });
    if(!correct) el.classList.add("wrong");
    const fb=$("feedback");
    fb.textContent = correct? "✓ Верно!" : "✗ Не то — правильный вариант подсвечен";
    fb.className="feedback "+(correct?"ok":"no");
    $("refLine").textContent=cur.refLine;
    sessionDone++; $("qProgress").textContent=`${sessionDone} / ${sessionTotal}`;
    $("btnNext").classList.remove("hidden"); $("btnSkip").classList.add("hidden");
    if(S.audio!=="off" && cur.answerGs) playList(cur.answerGs);
  }

  $("btnPlayPrompt").onclick=()=> cur && cur.audioGs && playList(cur.audioGs);

  // ---------- скачивание аудио для офлайна ----------
  const sleep=ms=>new Promise(r=>setTimeout(r,ms));
  const AUDIO_CACHE="quran-audio";   // то же имя кэша, что в sw.js
  // Скачивает ОДИН аят и сам кладёт его в кэш, дожидаясь записи (так ловим
  // переполнение хранилища на iPhone). Пропускает уже скачанное.
  // Возвращает: "cached" | "ok" | "quota" | "fail".
  async function grabAudio(g){
    const url=audioUrl(g);
    let cache=null;
    try{ cache=await caches.open(AUDIO_CACHE); if(await cache.match(url)) return "cached"; }catch(e){}
    for(let a=0;a<4;a++){
      try{
        const res=await fetch(url,{mode:"no-cors"});
        if(cache) await cache.put(url,res);      // ждём запись — иначе не узнаем про переполнение
        return "ok";
      }catch(e){
        if(e && (e.name==="QuotaExceededError" || /quota/i.test(e.message||""))) return "quota";
        await sleep(700*(a+1));
      }
    }
    return "fail";
  }
  let dling=false;
  // Скачивает список аятов в офлайн-кэш (страница / джуз / сура). label — для статуса.
  async function downloadGs(gs, label, el){
    if(dling) return; dling=true;
    const st=$("dlStatus"); if(el) el.style.opacity=".5";
    st.textContent=`Скачиваю ${label}…`;
    let done=0, quota=false; const failed=[];
    for(let i=0;i<gs.length;i++){                 // строго последовательно — надёжно на iPhone
      const r=await grabAudio(gs[i]);
      if(r==="ok"||r==="cached") done++; else { failed.push(gs[i]); if(r==="quota"){quota=true;} }
      st.textContent=`${label}: ${i+1} / ${gs.length}`;
      if(quota) break;
      if(r==="ok") await sleep(100);              // пауза только после реальной загрузки
    }
    if(el) el.style.opacity="";
    if(quota) st.textContent=`Память приложения заполнена (сохранено ${done} из ${gs.length}). На iPhone у веб-приложений лимит — скачивай по 1–2 за раз.`;
    else if(failed.length) st.textContent=`${label}: скачано ${done} из ${gs.length}. Не удалось ${failed.length} — нажми ещё раз.`;
    else st.textContent=`Готово ✓ ${label} доступна офлайн (${gs.length} аятов).`;
    dling=false; await loadCached(); renderSelector();
  }

  $("btnNext").onclick=()=>newQuestion();
  $("btnSkip").onclick=()=>{ sessionDone++; newQuestion(); };

  // клавиатура
  document.addEventListener("keydown",e=>{
    if($("quiz").classList.contains("hidden")) return;
    if(e.key==="Enter"){ if(answered) newQuestion(); return; }
    if(/^[0-9]$/.test(e.key)){ const idx = e.key==="0"?9:(+e.key-1); const el=$("optsBox").children[idx]; if(el && !answered) el.click(); }
  });

  // ====================================================================
  //  НАВИГАЦИЯ
  // ====================================================================
  function showQuiz(){ $("home").classList.add("hidden"); $("quiz").classList.remove("hidden"); $("quizBar").classList.remove("hidden"); $("btnBack").classList.remove("hidden"); sessionDone=0;sessionTotal=0; newQuestion(); }
  function showHome(){ $("quiz").classList.add("hidden"); $("quizBar").classList.add("hidden"); $("btnBack").classList.add("hidden"); $("home").classList.remove("hidden"); player.pause(); updateSelCount(); }
  $("btnStart").onclick=()=>{ if(!activeGset().size){toast("Выбери хотя бы что-то для тренировки");return;} showQuiz(); };
  $("btnBack").onclick=showHome;

  // ---------- старт ----------
  applyTheme(); renderColorUI(); renderSelector(); loadCached().then(renderSelector);
})();
</script>
<script>
// Регистрация service worker (работает только по https:// или на localhost).
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
}
</script>
